<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Tech News</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:30px;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:32px;
}

button{
padding:8px 15px;
border:none;
background:#000000;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
width:220px;
margin-right:10px;
}

.tags span{
border:1px solid #ccc;
padding:6px 12px;
border-radius:5px;
margin-right:5px;
background:white;
cursor:pointer;
}

.tags span:hover{
background:#000000;
color:white;
}

.dark .tags span{
background:#1e1e1e;
}

/* Trending Slider */

.slider{
background:#000000;
color:white;
padding:10px;
margin-bottom:20px;
overflow:hidden;
border-radius:5px;
}

.slide{
white-space:nowrap;
animation:scroll 15s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* News Cards */

#newsContainer{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.news{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.dark .news{
background:#1e1e1e;
}

.news:hover{
transform:translateY(-5px);
}

.news img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.meta{
font-size:13px;
color:gray;
}

.read{
display:inline-block;
margin-top:10px;
color:#000000;
text-decoration:none;
font-weight:bold;
}

.read:hover{
text-decoration:underline;
}

.no-news{
text-align:center;
font-size:20px;
margin-top:40px;
}

</style>

</head>

<body>

<div class="top-bar">
<h1>Tech News</h1>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="slider">
<div class="slide">
🔥 AI robots may change work by 2026 |
🔥 Future technology trends |
🔥 AI productivity warning |
🔥 Cloud computing demand rising |
🔥 Scientists explore tech breakthroughs
</div>
</div>

<input id="searchInput" placeholder="Search news">
<button onclick="searchNews()">Search</button>

<br><br>

<div class="tags">
<span onclick="quickSearch('ai')">AI</span>
<span onclick="quickSearch('technology')">Technology</span>
<span onclick="quickSearch('startup')">Startup</span>
<span onclick="quickSearch('future')">Future</span>
</div>

<div id="newsContainer"></div>

<script>

const manualNews=[

{
title:"AI expert Geoffrey Hinton predicts robots could transform work by 2026",
author:"Times of India",
points:1200,
comments:320,
url:"https://timesofindia.indiatimes.com/technology/tech-news/godfather-of-ai-geoffrey-hinton-made-a-bold-prediction-for-2026-robots-may-rule-how-we-work-and-live/articleshow/128751693.cms",
image:"https://images.unsplash.com/photo-1677442136019-21780ecad995"
},

{
title:"Narayana Murthy warns Indian youth about AI productivity future",
author:"Times of India",
points:980,
comments:210,
url:"https://timesofindia.indiatimes.com/technology/tech-news/narayana-murthy-issues-ai-warning-for-indian-youth-smarter-mind-will-get-better-quality-and-better-level-of-productivity/articleshow/128838677.cms",
image:"https://images.unsplash.com/photo-1551434678-e076c223a692"
},

{
title:"AI technology trends and predictions for 2026",
author:"IBM",
points:730,
comments:110,
url:"https://www.ibm.com/think/news/ai-tech-trends-predictions-2026",
image:"https://images.unsplash.com/photo-1677442135968-6c7c9e6a8b5c"
},

{
title:"Top technology trends shaping the future",
author:"Simplilearn",
points:640,
comments:95,
url:"https://www.simplilearn.com/top-technology-trends-and-jobs-article",
image:"https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
}

]

function displayNews(list){

const container=document.getElementById("newsContainer")
container.innerHTML=""

if(list.length===0){
container.innerHTML=`<div class="no-news">No News Found</div>`
return
}

list.forEach(post=>{

let card=document.createElement("div")
card.className="news"

card.innerHTML=`

<img src="${post.image}" onerror="this.src='https://via.placeholder.com/400x200'">

<div class="content">

<h3>${post.title}</h3>

<div class="meta">Author: ${post.author}</div>
<div class="meta">Points: ${post.points}</div>
<div class="meta">Comments: ${post.comments}</div>

<a class="read" href="${post.url}" target="_blank">Read Article</a>

</div>
`

container.appendChild(card)

})

}

function searchNews(){

let query=document.getElementById("searchInput").value.toLowerCase()

let filtered=manualNews.filter(n =>
n.title.toLowerCase().includes(query)
)

displayNews(filtered)

}

function quickSearch(tag){

let filtered=manualNews.filter(n =>
n.title.toLowerCase().includes(tag)
)

displayNews(filtered)

}

document.getElementById("searchInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
searchNews()
}

})

function toggleDark(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("mode","dark")
}else{
localStorage.setItem("mode","light")
}

}

if(localStorage.getItem("mode")==="dark"){
document.body.classList.add("dark")
}

displayNews(manualNews)

</script>

</body>
</html>
